name: Profile maintenance
description: Track a real profile or repository maintenance task.
title: "[Profile Maintenance]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete profile, README, visual, automation, documentation, or repository hygiene work.
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to be improved?
      placeholder: Describe the maintenance task.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: What should be true when this is complete?
      placeholder: List the acceptance checks.
    validations:
      required: true
