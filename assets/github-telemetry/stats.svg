<svg xmlns="http://www.w3.org/2000/svg" width="470" height="240" viewBox="0 0 470 240" role="img" aria-labelledby="title desc">
<title id="title">Repository Stats</title>
<desc id="desc">Repository count, stars, forks, and recency.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0D1117"/>
<stop offset="100%" stop-color="#1B2030"/>
</linearGradient>
<linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#22D3EE"/>
<stop offset="50%" stop-color="#A78BFA"/>
<stop offset="100%" stop-color="#F472B6"/>
</linearGradient>
<style><![CDATA[
.title{font:800 28px Segoe UI,Inter,Arial,sans-serif;fill:#E5E7EB}
.subtitle{font:700 14px Consolas,Menlo,monospace;fill:#22D3EE}
.label{font:700 13px Consolas,Menlo,monospace;fill:#94A3B8}
.value{font:800 25px Segoe UI,Inter,Arial,sans-serif;fill:#E5E7EB}
.body{font:600 14px Segoe UI,Inter,Arial,sans-serif;fill:#CBD5E1}
.mono{font:600 12px Consolas,Menlo,monospace;fill:#94A3B8}
.axis{stroke:#334155;stroke-width:1}
]]></style>
</defs>
<rect width="470" height="240" rx="18" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="469" height="239" rx="17.5" fill="none" stroke="#263244"/>
<path d="M28 54 H442" stroke="url(#neon)" stroke-width="2" opacity="0.7"/>
<text x="28" y="36" class="title">Repository Stats</text>
<rect x="28" y="78" width="190" height="72" rx="14" fill="#161B22" stroke="#22D3EE" stroke-opacity="0.42"/>
<text x="44" y="106" class="label">Public repos</text>
<text x="44" y="136" class="value">24</text>
<rect x="252" y="78" width="190" height="72" rx="14" fill="#161B22" stroke="#34D399" stroke-opacity="0.42"/>
<text x="268" y="106" class="label">Updated in 90d</text>
<text x="268" y="136" class="value">24</text>
<rect x="28" y="164" width="190" height="72" rx="14" fill="#161B22" stroke="#A78BFA" stroke-opacity="0.42"/>
<text x="44" y="192" class="label">Stars</text>
<text x="44" y="222" class="value">1</text>
<rect x="252" y="164" width="190" height="72" rx="14" fill="#161B22" stroke="#F472B6" stroke-opacity="0.42"/>
<text x="268" y="192" class="label">Forks</text>
<text x="268" y="222" class="value">1</text>
<text x="28" y="226" class="mono">Snapshot 2026-06-11 00:13 UTC+08</text>
</svg>
