<svg xmlns="http://www.w3.org/2000/svg" width="88" height="88" viewBox="0 0 88 88" role="img" aria-labelledby="title desc">
<title id="title">Dash</title>
<desc id="desc">Rounded square logo card for Dash</desc>
<defs>
  <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#06131B"/>
  </linearGradient>
  <linearGradient id="card-stroke" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#22D3EE"/>
    <stop offset="52%" stop-color="#A78BFA"/>
    <stop offset="100%" stop-color="#FB7185"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#020617" flood-opacity="0.55"/>
  </filter>
</defs>
<rect x="3" y="3" width="82" height="82" rx="20" fill="url(#card-bg)" stroke="url(#card-stroke)" stroke-width="1.4" opacity="0.98" filter="url(#shadow)"/>
<rect x="9" y="9" width="70" height="70" rx="16" fill="#020617" opacity="0.34"/>
<rect x="17" y="10" width="54" height="48" rx="15" fill="#F8FAFC" opacity="0.96"/>
<rect x="17" y="10" width="54" height="48" rx="15" fill="none" stroke="#FFFFFF" stroke-opacity="0.68"/>
<text x="44" y="45" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900" fill="#38BDF8">Dash</text>
<text x="44" y="73" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="8.7" font-weight="800" fill="#CFFAFE">Dash</text>
</svg>
