<svg xmlns="http://www.w3.org/2000/svg" width="88" height="88" viewBox="0 0 88 88" role="img" aria-labelledby="title desc">
<title id="title">statsmodels</title>
<desc id="desc">Rounded square logo card for statsmodels</desc>
<defs>
  <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#172033"/>
    <stop offset="54%" stop-color="#0B1F2A"/>
    <stop offset="100%" stop-color="#061F1B"/>
  </linearGradient>
  <linearGradient id="card-stroke" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#22D3EE"/>
    <stop offset="52%" stop-color="#A78BFA"/>
