<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fishman7337 Profile README Visual QA</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070f;
      --panel: #0b1f24;
      --text: #ecfeff;
      --muted: #9eb7c7;
      --cyan: #22d3ee;
      --pink: #fb7185;
      --green: #2dd4bf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    .wrap {
      width: min(1180px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }
    header {
      margin-bottom: 18px;
    }
    h1 {
      font-size: 34px;
      line-height: 1.1;
      margin: 0 0 8px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    h2 {
      margin: 28px 0 12px;
      font-size: 17px;
      color: var(--green);
      font-family: "JetBrains Mono", Consolas, monospace;
      letter-spacing: 0;
    }
    img {
      width: 100%;
      display: block;
      margin: 0;
      border: 1px solid rgba(34, 211, 238, .32);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .42);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>fishman7337 Profile README Visual QA</h1>
      <p>Generated animated SVG gallery for local visual QA.</p>
    </header>

    <h2>01 / hero-cyberdeck.svg</h2>
    <img src="../assets/hero-cyberdeck.svg" alt="hero-cyberdeck.svg">

    <h2>02 / mission-control.svg</h2>
    <img src="../assets/mission-control.svg" alt="mission-control.svg">

    <h2>03 / quantum-lab.svg</h2>
    <img src="../assets/quantum-lab.svg" alt="quantum-lab.svg">

    <h2>04 / project-nebula.svg</h2>
    <img src="../assets/project-nebula.svg" alt="project-nebula.svg">

    <h2>05 / skill-constellation.svg</h2>
    <img src="../assets/skill-constellation.svg" alt="skill-constellation.svg">

    <h2>06 / timeline-roadmap.svg</h2>
    <img src="../assets/timeline-roadmap.svg" alt="timeline-roadmap.svg">

    <h2>07 / terminal-lab.svg</h2>
    <img src="../assets/terminal-lab.svg" alt="terminal-lab.svg">

    <h2>08 / footer-wave.svg</h2>
    <img src="../assets/footer-wave.svg" alt="footer-wave.svg">
  </main>
</body>
</html>
