research:
  title: Quantum-Enhanced GANs
  subtitle: Comparative Analysis of Classical and Hybrid Quantum-Classical GANs
  arxiv_id: "2508.09209"
  summary: Hybrid quantum-classical GANs with quantum-circuit latent priors, benchmarked against classical GAN baselines.
  bullets:
    - Classical GAN vs 3-, 5-, and 7-qubit HQCGAN variants
    - Qiskit AerSimulator with realistic noise models
    - Binary MNIST digits 0 and 1 to respect near-term quantum constraints
    - 150-epoch training runs with reproducible experiment configs
    - FID and KID evaluation for honest image-quality benchmarking
  result_note: Classical GAN led overall; the 7-qubit HQCGAN remained competitive and narrowed the gap in later epochs.

